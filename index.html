<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK Class Schedule</title>
    <style>
        .async-class {
            background-color: lightcoral;
        }
        .homeroom-class {
            background-color: lightorange;
        }
    </style>
    <script>
        // Function to save colors to localStorage
        function saveColors() {
            const asyncColor = document.getElementById('asyncColor').value;
            const homeroomColor = document.getElementById('homeroomColor').value;
            localStorage.setItem('asyncClassColor', asyncColor);
            localStorage.setItem('homeroomClassColor', homeroomColor);
        }

        // Function to load colors from localStorage
        function loadColors() {
            const asyncColor = localStorage.getItem('asyncClassColor') || 'lightcoral';
            const homeroomColor = localStorage.getItem('homeroomClassColor') || 'lightorange';
            document.getElementById('asyncColor').value = asyncColor;
            document.getElementById('homeroomColor').value = homeroomColor;
            document.querySelectorAll('.async-class').forEach(elem => elem.style.backgroundColor = asyncColor);
            document.querySelectorAll('.homeroom-class').forEach(elem => elem.style.backgroundColor = homeroomColor);
        }

        window.onload = loadColors;
    </script>
</head>
<body>
    <h1>Class Schedule</h1>
    <div class="async-class">Async Class Example</div>
    <div class="homeroom-class">Homeroom Class Example</div>

    <div>
        <h2>Customization Panel</h2>
        <label for="asyncColor">Async Class Color:</label>
        <input type="color" id="asyncColor" onchange="saveColors()">
        <br>
        <label for="homeroomColor">Homeroom Class Color:</label>
        <input type="color" id="homeroomColor" onchange="saveColors()">
    </div>
</body>
</html>
